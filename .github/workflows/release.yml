name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install schema compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin zip jq

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Pack extension
        run: |
          cd gnome-extension
          # buildinfo.json embeds the build timestamp shown in the Debug submenu.
          printf '{"buildTime": "%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > buildinfo.json
          glib-compile-schemas schemas/
          UUID=$(jq -r .uuid metadata.json)
          ZIP="../whatcable-gnome-extension-${GITHUB_REF_NAME}.zip"
          zip -r "${ZIP}" \
            metadata.json extension.js prefs.js stylesheet.css buildinfo.json \
            schemas/org.gnome.shell.extensions.whatcable.gschema.xml \
            schemas/gschemas.compiled
          # Sanity check: the zip must have files at the root, not nested under
          # a directory — that's what extensions.gnome.org requires.
          unzip -l "${ZIP}"
          echo "UUID=${UUID}" >> "${GITHUB_ENV}"
          echo "ZIP=${ZIP#../}" >> "${GITHUB_ENV}"

      - name: Lint extension
        run: uvx shexli "${ZIP}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Release Asset

            | File | Description |
            |------|-------------|
            | `whatcable-gnome-extension-${{ github.ref_name }}.zip` | GNOME Shell extension. Install with `gnome-extensions install --force <file>`. |

            ### Requirements

            The extension shells out to the `whatcable-linux` CLI. Install it from
            [Zetaphor/whatcable-linux](https://github.com/Zetaphor/whatcable-linux)
            and make sure the binary is on your `$PATH` (or in `/usr/local/bin` / `/usr/bin`)
            before enabling the extension.

            ### Quick install

            ```bash
            gnome-extensions install --force whatcable-gnome-extension-${{ github.ref_name }}.zip
            # Restart GNOME Shell (log out / back in on Wayland)
            gnome-extensions enable ${{ env.UUID }}
            ```
          files: |
            whatcable-gnome-extension-*.zip
