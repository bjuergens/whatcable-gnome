name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y gcc-c++ cmake \
            qt6-qtbase-devel \
            systemd-devel tar gzip zip

      - name: Configure
        run: cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package CLI binary
        run: |
          mkdir -p build/dist
          cp build/src/cli/whatcable-linux build/dist/
          cd build/dist
          tar czf ../whatcable-linux-cli-${GITHUB_REF_NAME}-x86_64.tar.gz whatcable-linux

      - name: Package GNOME Shell extension
        run: |
          cd gnome-extension
          zip -j ../build/whatcable-gnome-extension-${GITHUB_REF_NAME}.zip \
            metadata.json extension.js stylesheet.css

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            build/whatcable-linux-cli-*.tar.gz
            build/whatcable-gnome-extension-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Release Assets

            | File | Description |
            |------|-------------|
            | `whatcable-linux-cli-${{ github.ref_name }}-x86_64.tar.gz` | Standalone CLI binary. Extract and run `./whatcable-linux`. |
            | `whatcable-gnome-extension-${{ github.ref_name }}.zip` | GNOME Shell extension. Install with `gnome-extensions install --force <file>`. Requires the CLI on `$PATH`. |

            ### Quick install (CLI)

            ```bash
            tar xzf whatcable-linux-cli-${{ github.ref_name }}-x86_64.tar.gz
            sudo mv whatcable-linux /usr/local/bin/
            ```

            ### Quick install (GNOME extension)

            ```bash
            gnome-extensions install --force whatcable-gnome-extension-${{ github.ref_name }}.zip
            # Restart GNOME Shell (log out / back in on Wayland)
            gnome-extensions enable whatcable@whatcable.local
            ```
          files: |
            assets/**/*.tar.gz
            assets/**/*.zip
